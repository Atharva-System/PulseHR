<!doctype html>
<html
  lang="en"
  class="light"
  style="color-scheme: light; background: #f8fafc; color: #0f172a"
>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Pulsee AI</title>
  </head>
  <body style="background-color: #f8fafc; color: #0f172a">
    <div id="root"></div>
    <script>
      // Force light mode — override Tailwind v4 dark mode from OS
      (function () {
        var s = document.documentElement.style;
        s.setProperty("color-scheme", "light", "important");
        s.setProperty("background-color", "#f8fafc", "important");
        s.setProperty("color", "#0f172a", "important");
        document.body.style.setProperty(
          "background-color",
          "#f8fafc",
          "important",
        );
        document.body.style.setProperty("color", "#0f172a", "important");
        // Remove any auto-injected dark styles
        new MutationObserver(function () {
          document.documentElement.style.setProperty(
            "color-scheme",
            "light",
            "important",
          );
        }).observe(document.head, { childList: true, subtree: true });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
